<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Agenda - Tableau de bord</title>
    <link rel="stylesheet" href="css/agenda-style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.7/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.7/index.global.min.js"></script>
</head>

<body class="dashboard-body">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="#4F46E5" />
                    <path
                        d="M12 10H28C29.1046 10 30 10.8954 30 12V28C30 29.1046 29.1046 30 28 30H12C10.8954 30 10 29.1046 10 28V12C10 10.8954 10.8954 10 12 10Z"
                        stroke="white" stroke-width="2" />
                    <line x1="10" y1="16" x2="30" y2="16" stroke="white" stroke-width="2" />
                    <line x1="16" y1="8" x2="16" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <line x1="24" y1="8" x2="24" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span class="logo-text">Mon Agenda</span>
            </div>
            <div class="nav-links">
                <a href="/user/agenda" class="nav-link active">Agenda</a>
                <a href="/user/profile" class="nav-link">Profil</a>
                <button onclick="logout()">Se déconnecter</button>
            </div>
        </div>
    </nav>

    <!-- Contenu principal -->
    <div class="dashboard-container">

        <!-- Sidebar à gauche -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Créer un événement</h3>
                <button class="btn btn-primary btn-full" id="btnNewEvent">+ Nouvel événement</button>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title">Événements à venir</h3>
                <div id="upcomingEvents" class="upcoming-events">
                    <div class="event-item">
                        <div class="event-date">15 Oct</div>
                        <div class="event-info">
                            <div class="event-title">Réunion d’équipe</div>
                            <div class="event-time">14:00 – 15:30</div>
                        </div>
                    </div>
                    <div class="event-item">
                        <div class="event-date">17 Oct</div>
                        <div class="event-info">
                            <div class="event-title">Rendez-vous médical</div>
                            <div class="event-time">10:00 – 11:00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Liste des calendriers -->
<!-- Liste des calendriers -->
<div class="sidebar-section calendars-list">
  <div class="sidebar-section">
    <h3 class="sidebar-title">Mes calendriers</h3>
    <button class="btn btn-primary btn-full" id="btnNewEvent">+ Nouvel Calendrier</button>
  </div>

  <!-- Calendriers visibles -->
  <div id="calendarVisible"></div>

  <!-- Calendriers masqués -->
  <details id="calendarHiddenWrapper">
    <summary class="show-more">Afficher plus</summary>
    <div id="calendarHidden"></div>
  </details>
</div>

        </aside>

        <!-- Zone principale (calendrier à droite) -->
        <main class="main-content">
            <div class="calendar-header">
                <div class="calendar-nav">
                    <button class="btn-icon" id="btnPrevMonth">◀</button>
                    <button class="btn btn-secondary" id="btnToday">Aujourd'hui</button>
                    <button class="btn-icon" id="btnNextMonth">▶</button>
                </div>
                <h1 class="calendar-title"></h1>
            </div>
            <div id="calendar"></div>
        </main>

    </div>

    <script src="js/agenda.js"></script>
    <script src="js/logout.js"></script>

</body>

</html>
